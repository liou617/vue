<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div id="app" class="container" style="width: 40%;">
        <p>{{FirstName}}</p>
        <p>{{LastName}}</p>
        <p>{{fullname()}}</p>
        <input type="date" v-model="date1">
        <input type="date" v-model="date">

    </div>
    <!-- <script src="https://unpkg.com/vue@latest"></script>//避免版本更新需要維護 -->
    <script src="https://unpkg.com/vue@3.5.31/dist/vue.global.js"></script>
    <script>
        var appVue = {
            data() { //model
                return {
                    FirstName: "Student",
                    LastName: "全端班",
                };
            },
            props: {
                Age: { type: Number, default: 10 }
            },
            methods: {        //controller      
                fullname() {
                    return `全名：${this.FirstName}${this.LastName}`;
                }
            },
            computed: {
                
                date() {
                    return new Date().toISOString().split("T")[0];
                },
                date1() {
                    return new Date();
                }
            }
        };
        var app = Vue.createApp(appVue).mount("#app");
        console.log(app.LastName);
        console.log(app.Age);
        console.log(app.date);



    </script>
</body>

</html>
