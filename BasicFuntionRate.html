<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div id="app" class="container" style="width:40%">
        <h3 class="mb-3 text-center">換匯功能</h3>
        <div class="form-floating mb-3">
            <input class="form-control" placeholder="" v-model="rate">
            <label class="form-label">匯率</label>
        </div>
        <div class="form-floating mb-3">
            <input class="form-control" placeholder="" v-model="usd">
            <label class="form-label">美金</label>
        </div>
        <div class="form-floating mb-3">
            <input class="form-control" placeholder="" v-model="twd">
            <label class="form-label">台幣</label>
        </div>
    </div>
    <!-- <script src="https://unpkg.com/vue@latest"></script>//避免版本更新需要維護 -->
    <script src="https://unpkg.com/vue@3.5.31/dist/vue.global.js"></script>
    <script>
        var appVue = {
            data() {                // model
                return {
                    rate: 30,
                    usd: 100,
                    twd: 0
                };
            },
            methods: {             // controller

            },
            watch: {
                rate(newVal, oriVal) {
                    this.twd = newVal * this.usd;
                },
                usd(newVal, oriVal) {
                    this.twd = (newVal * this.rate).toFixed(2);
                }
            }
        };

        var app = Vue.createApp(appVue).mount("#app");

    </script>
</body>

</html>
