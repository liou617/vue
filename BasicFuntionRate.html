<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三課：換匯功能</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
    <div id="app" class="container" style="width:40%; margin-top: 2rem;">
        <h3 class="mb-3 text-center">換匯功能</h3>
        
        <div class="form-floating mb-3">
            <input class="form-control" type="number" v-model="rate">
            <label class="form-label">匯率</label>
        </div>
        
        <div class="form-floating mb-3">
            <input class="form-control" type="number" v-model="usd" @input="calcTwd">
            <label class="form-label">美金</label>
        </div>
        
        <div class="form-floating mb-3">
            <input class="form-control" type="number" v-model="twd" @input="calcUsd">
            <label class="form-label">台幣</label>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3.5.31/dist/vue.global.js"></script>
    <script>
        var appVue = {
            data() { // 存放變數
                return {
                    rate: 32, // 預設匯率
                    usd: 0,
                    twd: 0
                };
            },
            methods: { // 存放動作函式
                calcTwd() {
                    // 算台幣：用 this 抓取美金與匯率來相乘
                    this.twd = this.usd * this.rate;
                },
                calcUsd() {
                    // 算美金：用 this 抓取台幣與匯率來相除
                    this.usd = this.twd / this.rate;
                }
            }
        };
        var app = Vue.createApp(appVue).mount("#app");
    </script>
</body>

</html>
