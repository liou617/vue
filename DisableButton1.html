<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
    <div id="app">
        <button v-bind:disabled="disable" v-on:click="submit" class="btn btn-primary">送出</button>
    </div>
    <script src="https://unpkg.com/vue@3.5.31/dist/vue.global.js"></script>
    <script>
        var appVue = {
            data() {            // model
                return {
                    disable: false
                };
            },
            methods: {           // controller
                submit() {
                    this.disable = true;
                }
            }
        };
        var app = Vue.createApp(appVue).mount("#app");
    </script>
</body>

</html>
