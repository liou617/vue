<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div id="app">
        <form ref="userForm" action="submit.html" method="post" v-on:submit.prevent="validateForm">
            <!-- form預設為get較不安全 -->
            <div class="container" style="width: 40%">
                <h3 class="mb-3 text-center">個人資料</h3>
                <div v-if="errors.length > 0" class="mb-3 text-danger">
                    <p>請修正以下錯誤：</p>
                    <ul>
                        <li v-for="error in errors">{{ error }}</li>
                    </ul>
                </div>
                <div class="form-floating mb-3">
                    <input name="name" class="form-control" maxlength="8" minlength="2"  v-model.trim="name"
                        placeholder="" /> <!-- 一定要有name屬性才能被驗證 -->
                    <label class="form-label">姓名</label>
                </div>
                <div class="form-floating mb-3">
                    <input name="age" class="form-control"  v-model.number="age" placeholder="" />
                    <label class="form-label">年齡</label>
                </div>
                <button type="submit">提交</button>

            </div>

        </form>
    </div>

    <script src="https://unpkg.com/vue@3.5.31/dist/vue.global.js"></script>
    <script>
        var appVue = {
            data() { //model
                return {
                    name: "",
                    age: "",
                    errors: [],
                };
            },
            methods: {
                validateForm() {
                    // alert("validate");
                    this.errors = []; // 清空錯誤訊息才能重新驗證
                    if (this.name.length == 0) {
                        this.errors.push("姓名為必填");
                    }
                    if (this.age < 20 || this.age >= 65) {
                        this.errors.push("年齡不符");
                    }
                    if (this.errors.length == 0) {
                        this.$refs.userForm.submit();   // 表單驗證通過，可以提交
                    }
                }

            }
        };
        var app = Vue.createApp(appVue).mount("#app");
    </script>
</body>

</html>
