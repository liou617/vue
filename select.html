<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div id="app" class="container" style="width: 50%;">
        <h3 class="mb-3 text-center">選擇費率方案</h3>
        <div class="mb-3">
            <label class="form-label">費率方案</label>
            <select class="form-select" v-model="choice" v-on:change="changeOption">
                <option v-for="option in options" v-bind:value="option.price">{{ option.name }}</option>
            </select>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3.5.31/dist/vue.global.js"></script>
    <script>
        const baseAddress = "https://localhost:7151";
        var appVue = {
            data() { //model
                return {
                    choice: 649,
                    options: [
                        // { name: "方案499", price: 499 },
                        // { name: "方案699", price: 649 },
                        // { name: "方案999", price: 899 }
                    ]

                };
            },
            methods: {
                changeOption() {
                    alert(this.choice);
                }
            },
            mounted: async function () {
                try {
                    var response = await fetch(`${baseAddress}/api/Products`, {
                        method: "GET",
                    });
                    if (response.ok) {
                        var data = await response.json();
                        // alert(JSON.stringify(data));
                        this.options = data;
                    }

                }
                catch (error) {
                    alert(error);
                }
            }
        };
        var app = Vue.createApp(appVue).mount("#app");
    </script>
</body>

</html>
